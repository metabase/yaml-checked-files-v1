name: Check YAML exports

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      exports: ${{ steps.find.outputs.exports }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Find export directories
        id: find
        # List all directories under exports/ as a JSON array for the matrix
        run: |
          exports=$(ls -d exports/*/ | xargs -n1 basename | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "exports=$exports" >> $GITHUB_OUTPUT

  check:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        export: ${{ fromJson(needs.discover.outputs.exports) }}
      fail-fast: false

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: yaml-checked-files

      - name: Checkout metabase
        uses: actions/checkout@v4
        with:
          repository: metabase/metabase
          ref: yaml-backed-metadata-provider
          fetch-depth: 1
          path: metabase

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Install Clojure CLI
        run: |
          curl -O https://download.clojure.org/install/linux-install-1.12.0.1488.sh
          sudo bash ./linux-install-1.12.0.1488.sh

      - name: Get week number
        id: week
        run: echo "week=$(date +%Y-%W)" >> $GITHUB_OUTPUT

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: clj-deps-${{ steps.week.outputs.week }}
          restore-keys: |
            clj-deps-

      - name: Run checker
        working-directory: metabase
        run: |
          clojure -X:ee metabase-enterprise.checker.checker/cli \
            :export '"${{ github.workspace }}/yaml-checked-files/exports/${{ matrix.export }}"' \
            :output '"/tmp/checker-output.txt"'

      - name: Show output
        run: cat /tmp/checker-output.txt
