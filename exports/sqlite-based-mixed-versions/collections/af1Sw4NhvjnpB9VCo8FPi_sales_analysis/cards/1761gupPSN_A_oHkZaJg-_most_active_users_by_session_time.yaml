dataset_query:
  database: bsb saas
  native:
    query: |2-
       SELECT u.user_name, u.user_role, SUM(t.session_duration_minutes) AS total_minutes
        FROM transactions_fact t
        JOIN users_dim u ON t.user_id = u.user_id
        GROUP BY t.user_id
        ORDER BY total_minutes DESC
        LIMIT 5;
  type: native
