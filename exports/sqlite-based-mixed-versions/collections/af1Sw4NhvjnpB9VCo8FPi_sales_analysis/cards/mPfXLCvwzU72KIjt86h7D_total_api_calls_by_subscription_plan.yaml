dataset_query:
  database: bsb saas
  native:
    query: |2-
       SELECT c.subscription_plan, SUM(t.api_calls_count) AS total_api_calls
        FROM transactions_fact t
        JOIN companies_dim c ON t.company_id = c.company_id
        GROUP BY c.subscription_plan
        ORDER BY total_api_calls DESC;
  type: native
