dataset_query:
  database: bsb saas
  native:
    query: |2-
       SELECT u.user_role,
               COUNT(*) AS total_events,
               AVG(t.session_duration_minutes) AS avg_session_mins,
               SUM(t.api_calls_count) AS total_api_calls
        FROM transactions_fact t
        JOIN users_dim u ON t.user_id = u.user_id
        GROUP BY u.user_role;
  type: native
