name: Sample Database
engine: h2
schemas:
  PUBLIC:
    PRODUCTS:
      fields: [CATEGORY, CREATED_AT, EAN, ID, PRICE, RATING, TITLE, VENDOR]
    INVOICES:
      fields: [ACCOUNT_ID, DATE_RECEIVED, EXPECTED_INVOICE, ID, PAYMENT, PLAN]
    ANALYTIC_EVENTS:
      fields: [ACCOUNT_ID, BUTTON_LABEL, EVENT, ID, PAGE_URL, TIMESTAMP]
    FEEDBACK:
      fields: [ACCOUNT_ID, BODY, DATE_RECEIVED, EMAIL, ID, RATING, RATING_MAPPED]
    ACCOUNTS:
      fields: [ACTIVE_SUBSCRIPTION, CANCELED_AT, COUNTRY, CREATED_AT, EMAIL, FIRST_NAME, ID, LAST_NAME, LATITUDE, LEGACY_PLAN, LONGITUDE, PLAN, SEATS, SOURCE, TRIAL_CONVERTED, TRIAL_ENDS_AT]
    PEOPLE:
      fields: [ADDRESS, BIRTH_DATE, CITY, CREATED_AT, EMAIL, ID, LATITUDE, LONGITUDE, NAME, PASSWORD, SOURCE, STATE, ZIP]
    ORDERS:
      fields: [CREATED_AT, DISCOUNT, ID, PRODUCT_ID, QUANTITY, SUBTOTAL, TAX, TOTAL, USER_ID]
    REVIEWS:
      fields: [BODY, CREATED_AT, ID, PRODUCT_ID, RATING, REVIEWER]
