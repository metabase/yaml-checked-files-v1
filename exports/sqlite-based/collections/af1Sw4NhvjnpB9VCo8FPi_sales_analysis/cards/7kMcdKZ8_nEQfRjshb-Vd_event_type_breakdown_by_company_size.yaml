dataset_query:
  database: bsb saas
  native:
    query: |2-
       SELECT c.company_size, t.event_type, COUNT(*) AS event_count
        FROM transactions_fact t
        JOIN companies_dim c ON t.company_id = c.company_id
        GROUP BY c.company_size, t.event_type
        ORDER BY c.company_size, event_count DESC;
  type: native
