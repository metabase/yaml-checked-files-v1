dataset_query:
  database: bsb saas
  native:
    query: |-
      SELECT c.company_name, c.subscription_plan,
               SUM(t.feature_usage_count) AS total_features,
               AVG(t.feature_usage_count) AS avg_features_per_event
        FROM transactions_fact t
        JOIN companies_dim c ON t.company_id = c.company_id
        GROUP BY t.company_id
        ORDER BY total_features DESC;
  type: native
