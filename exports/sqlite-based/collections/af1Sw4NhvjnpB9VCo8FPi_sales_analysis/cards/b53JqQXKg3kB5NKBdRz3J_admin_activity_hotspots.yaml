dataset_query:
  database: bsb saas
  native:
    query: |2-
        SELECT c.company_name, c.company_industry,
               SUM(t.admin_actions_count) AS total_admin_actions,
               COUNT(CASE WHEN t.event_type = 'admin_action' THEN 1 END) AS admin_events
        FROM transactions_fact t
        JOIN companies_dim c ON t.company_id = c.company_id
        GROUP BY t.company_id
        HAVING total_admin_actions > 0
        ORDER BY total_admin_actions DESC;
  type: native
