dataset_query:
  database: bsb saas
  native:
    query: |2-
       SELECT c.company_name, c.contract_value, c.subscription_plan,
               COUNT(t.event_id) AS total_events,
               SUM(t.api_calls_count) AS total_api_calls
        FROM companies_dim c
        LEFT JOIN transactions_fact t ON c.company_id = t.company_id
        GROUP BY c.company_id
        ORDER BY c.contract_value DESC;
  type: native
